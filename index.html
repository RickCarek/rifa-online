<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --ouro:#d4af37; --ouro-claro:#f0c75e; --ouro-escuro:#9a7b1e;
    --preto:#0a0805; --carvao:#171310; --carvao-2:#221c15;
    --livre:#171310; --livre-b:#3a3226; --livre-t:#cbb87a;
    --reserv:#8a6d1f; --reserv-b:#c9a83a; --reserv-t:#fff6da;
    --pago:linear-gradient(135deg,#d4af37,#f0c75e 55%,#b8912c); --pago-b:#f0c75e; --pago-t:#1a1406;
  }
  html{ background:var(--preto); }
  body{ margin:0 auto; max-width:560px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 500px at 50% -100px,#2a2115 0%,var(--preto) 60%); color:#e8e0cc; padding:0 0 90px;
    box-shadow:0 0 40px rgba(0,0,0,.8); min-height:100vh; }
  header{ position:sticky; top:0; z-index:20; background:rgba(10,8,5,.97); color:#fff; padding:14px 16px 12px;
    box-shadow:0 2px 16px rgba(0,0,0,.6); border-bottom:1px solid #2e2617; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand img{ width:52px; height:52px; border-radius:50%; border:2px solid var(--ouro); object-fit:cover;
    box-shadow:0 0 14px rgba(212,175,55,.35); }
  h1{ font-size:19px; margin:0; color:var(--ouro-claro); letter-spacing:.5px; font-family:'Playfair Display',Georgia,serif; }
  .sub{ font-size:12px; color:#a89968; }
  #conn{ font-size:11px; margin-top:4px; color:#fca5a5; }
  #conn.ok{ color:#e3c565; }
  .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:12px; }
  .stat{ background:var(--carvao); border:1px solid #2e2617; border-radius:10px; padding:8px 4px; text-align:center; }
  .stat b{ display:block; font-size:18px; line-height:1.1; color:#f5ecd2; }
  .stat span{ font-size:10px; color:#a89968; text-transform:uppercase; letter-spacing:.5px; }
  .total{ margin-top:8px; text-align:center; background:linear-gradient(135deg,#2a2115,#1a1406); border:1px solid var(--ouro-escuro);
    border-radius:10px; padding:8px; font-size:14px; color:var(--ouro-claro); }
  .total b{ font-size:17px; color:#f5ecd2; }
  /* ── Barra de urgência ── */
  .progress{ margin-top:12px; }
  .progress-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  #prog-label{ font-size:14px; font-weight:800; color:#ffcf4d; letter-spacing:.3px; }
  #prog-rest{ font-size:12px; font-weight:700; color:#cbb87a; }
  .progress-track{ height:20px; background:#14100a; border:1px solid #3a3226; border-radius:20px; overflow:hidden; position:relative; }
  .progress-fill{ height:100%; width:0; border-radius:20px; transition:width .7s cubic-bezier(.2,.8,.2,1);
    background:linear-gradient(90deg,#9a7b1e,#d4af37 40%,#f0c75e 70%,#ffb43d);
    background-size:200% 100%; box-shadow:0 0 14px rgba(240,199,94,.55); animation:shimmer 2.5s linear infinite; }
  @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .progress-pct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; color:#1a1406; text-shadow:0 1px 1px rgba(255,255,255,.25); }
  .progress.hot #prog-label{ color:#ff7a45; animation:pulse 1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.55} }
  /* ── Prêmio ── */
  .premio{ margin:14px 12px 0; background:var(--carvao); border:1px solid var(--ouro-escuro); border-radius:16px;
    overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.5); }
  .premio .cap{ padding:10px 14px; font-size:13px; color:var(--ouro-claro); text-align:center;
    border-top:1px solid #2e2617; font-family:'Playfair Display',Georgia,serif; letter-spacing:.4px; }
  /* ── Carrossel ── */
  .carousel{ position:relative; }
  .track{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .track::-webkit-scrollbar{ display:none; }
  .slide{ flex:0 0 100%; scroll-snap-align:center; }
  .slide img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#0a0805; }
  .cbtn{ position:absolute; top:50%; transform:translateY(-50%); width:38px; height:38px; border:none;

    display:flex; align-items:center; justify-content:center; z-index:2; border:1px solid var(--ouro-escuro); }
  .cbtn.prev{ left:10px; } .cbtn.next{ right:10px; }
  .dots{ position:absolute; bottom:10px; left:0; right:0; display:flex; gap:6px; justify-content:center; z-index:2; }

    position:sticky; top:0; z-index:19; }

  #search{ flex:1; min-width:120px; background:var(--carvao); color:#f5ecd2; border:1px solid #3a3226;
    border-radius:20px; padding:7px 14px; font-size:14px; }
  #search::placeholder{ color:#7a6c48; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:6px; padding:12px; }
  .num{ aspect-ratio:1; border-radius:10px; border:2px solid var(--livre-b); background:var(--livre);
    color:var(--livre-t); font-size:15px; font-weight:700; display:flex; flex-direction:column;

  .num:active{ transform:scale(.93); }
  .num small{ font-size:8px; font-weight:600; max-width:100%; overflow:hidden; text-overflow:ellipsis;

  .num.reservado{ background:var(--reserv); border-color:var(--reserv-b); color:var(--reserv-t); }
  .num.pago{ background:var(--pago); border-color:var(--pago-b); color:var(--pago-t); }

  .hidden{ display:none !important; }
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:flex-end; z-index:50; }

  .badge.pago{ background:var(--pago); color:var(--pago-t); }
  label{ font-size:12px; color:#a89968; font-weight:600; display:block; margin:10px 0 4px; }
  .sheet input{ width:100%; padding:11px 12px; background:#221c15; border:1px solid #3a3226; color:#f5ecd2;
    border-radius:10px; font-size:16px; }
  .btns{ display:flex; flex-direction:column; gap:8px; margin-top:18px; }
  .btn{ border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-pago{ background:linear-gradient(135deg,#d4af37,#f0c75e); color:#1a1406; }
  .btn-reservar{ background:#8a6d1f; color:#fff6da; }
  .btn-liberar{ background:transparent; color:#e07070; border:1.5px solid #6e2a2a; }
  .btn-fechar{ background:#221c15; color:#cbb87a; border:1px solid #3a3226; }
  .locknote{ background:#241b06; border:1px solid #6e5716; color:#e3c565; font-size:13px;
    padding:10px 12px; border-radius:10px; margin-top:6px; }
  .pixnote{ background:#101d24; border:1px solid #23495c; color:#8ecae6; font-size:13px;
    padding:10px 12px; border-radius:10px; margin-top:10px; word-break:break-all; }
  .num.incart{ outline:3px solid #f0c75e; outline-offset:-2px; box-shadow:0 0 12px rgba(240,199,94,.55); }
  .num.incart::before{ content:"🛒"; position:absolute; top:2px; left:4px; font-size:9px; }
  .cartbar{ position:fixed; bottom:64px; left:50%; transform:translateX(-50%); width:calc(100% - 20px);
    max-width:540px; background:linear-gradient(135deg,#2a2115,#1a1406); border:2px solid #d4af37;
    border-radius:14px; padding:10px 12px; z-index:29; display:flex; align-items:center; gap:10px;
    box-shadow:0 6px 24px rgba(0,0,0,.6); }
  .cartbar .ci{ flex:1; font-size:13px; color:#f5ecd2; line-height:1.4; }
  .cartbar .ci b{ color:#f0c75e; }
  .cartbar button.pagar{ background:linear-gradient(135deg,#d4af37,#f0c75e); color:#1a1406; border:none;
    border-radius:10px; padding:11px 16px; font-weight:800; font-size:14px; white-space:nowrap; }
  .cartbar button.limpar{ background:transparent; border:none; color:#e07070; font-size:20px; padding:4px 6px; }
  .footbar{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px;
    background:rgba(10,8,5,.97); display:flex; gap:8px;
    padding:10px 12px; z-index:30; box-shadow:0 -2px 16px rgba(0,0,0,.6); border-top:1px solid #2e2617; }
  .footbar button{ flex:1; background:var(--carvao); color:#cbb87a; border:1px solid #3a3226; border-radius:10px;
    padding:11px; font-size:13px; font-weight:600; }
  .footbar button.on{ background:var(--ouro); color:#1a1406; border-color:var(--ouro-claro); }
  .warn{ background:#7f1d1d; color:#fff; padding:10px 14px; font-size:13px; text-align:center; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script>
let db=null, auth=null, state={}, filter="todos", current=null, isAdmin=false;
let cart=[]; // números escolhidos para pagar juntos num único Pix

function boot(){
  if(FIREBASE_CONFIG.apiKey==="COLE_AQUI"){
    document.getElementById("setupwarn").classList.remove("hidden");
    document.getElementById("conn").textContent="sem configuração";
    render(); return;
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  db   = firebase.database();
  auth = firebase.auth();
  auth.onAuthStateChanged(u=>{ setAdmin(!!u); });
  db.ref(".info/connected").on("value", s=>{
    const on = s.val()===true;
    const c = document.getElementById("conn");
    c.textContent = on ? "● conectado — atualiza em tempo real" : "● offline";
    c.className = on ? "ok" : "";
  });
  db.ref("nums").on("value", snap=>{
    state = snap.val()||{}; render();
    // Fase 2: quando o webhook marca "pago", o comprador vê a confirmação na hora
    // (só se não estiver com a tela de outro número aberta)
    if(payingFor && payingFor.length && payingFor.every(x=>rawSt(x)==="pago") && !isAdmin &&
       (current===null || payingFor.includes(current))) showPaidOk(payingFor);
  });
  render(); // desenha o quadro imediatamente, mesmo antes do banco responder
  setInterval(render, 15000); // reservas expiradas voltam a ficar livres sem precisar recarregar

  // logo + foto do prêmio (se os arquivos existirem na pasta)
  if(LOGO_IMG) document.getElementById("logo").src = LOGO_IMG;
  buildCarousel();
}

// ── Carrossel do prêmio ──────────────────────────────────────
let cIdx=0, cTimer=null;
function buildCarousel(){
  const imgs=(typeof PRIZE_IMGS!=="undefined"?PRIZE_IMGS:[]).filter(Boolean);
  if(!imgs.length) return;
  const track=document.getElementById("track");
  const dots=document.getElementById("dots");
  let loaded=false;
  track.innerHTML=""; dots.innerHTML="";
  imgs.forEach((src,i)=>{
    const s=document.createElement("div"); s.className="slide";
    const im=document.createElement("img"); im.alt="Prêmio da rifa "+(i+1); im.loading="eager";
    im.onload=()=>{ if(!loaded){ loaded=true; document.getElementById("premio").style.display="block"; } };
    im.src=src; s.appendChild(im); track.appendChild(s);
    if(imgs.length>1){
      const d=document.createElement("button"); d.className="dot"+(i===0?" on":"");
      d.onclick=()=>goSlide(i); dots.appendChild(d);
    }
  });
  document.getElementById("premio-cap").textContent = PRIZE_DESC;
  const single = imgs.length<2;
  document.getElementById("c-prev").style.display = single?"none":"";
  document.getElementById("c-next").style.display = single?"none":"";
  if(single) return;
  document.getElementById("c-prev").onclick=()=>goSlide(cIdx-1);
  document.getElementById("c-next").onclick=()=>goSlide(cIdx+1);
  track.onscroll=()=>{ const i=Math.round(track.scrollLeft/track.clientWidth); if(i!==cIdx) setDot(i); };
  startAuto(imgs.length);
}
function goSlide(i){
  const track=document.getElementById("track");
  const n=track.children.length; if(!n) return;
  cIdx=(i+n)%n;
  track.scrollTo({left:cIdx*track.clientWidth, behavior:"smooth"});
  setDot(cIdx); startAuto(n); // reinicia o timer ao interagir
}
function setDot(i){ cIdx=i; document.querySelectorAll(".dot").forEach((d,j)=>d.classList.toggle("on",j===i)); }
function startAuto(n){ if(cTimer) clearInterval(cTimer); if(n<2) return;
  cTimer=setInterval(()=>goSlideAuto(n),5000); }
function goSlideAuto(n){ const track=document.getElementById("track"); cIdx=(cIdx+1)%n;
  track.scrollTo({left:cIdx*track.clientWidth, behavior:"smooth"}); setDot(cIdx); }

function setAdmin(on){
  isAdmin = on;
  const b = document.getElementById("btn-admin");
  b.classList.toggle("on", on);
  b.textContent = on ? "🔓 Dono (ativo)" : "🔑 Modo dono";
  render(); // atualiza visibilidade do Arrecadado
}

// Guarda os dados do comprador NESTE aparelho, pra reservar vários números sem redigitar
function getBuyer(){ try{ return JSON.parse(localStorage.getItem("rifa_comprador")||"{}"); }catch(e){ return {}; } }
function saveBuyer(nome,tel){ try{ localStorage.setItem("rifa_comprador", JSON.stringify({nome,tel})); }catch(e){} }
function clearBuyer(){ try{ localStorage.removeItem("rifa_comprador"); }catch(e){} closeNum(); openNum(current); }

const RESERVE_MS = RESERVE_MIN*60000;
function rawSt(n){ return (state[n] && state[n].status) || "livre"; }
// reserva expirada? (passou do prazo sem virar "pago")
function isExpired(n){ const r=state[n]; return !!(r && r.status==="reservado" && r.ts && (Date.now()-r.ts > RESERVE_MS)); }
// status efetivo: pro comprador, reserva expirada conta como livre; o dono continua vendo como reservado
function st(n){ if(!isAdmin && isExpired(n)) return "livre"; return rawSt(n); }
// contador regressivo da reserva
let cdTimer=null;
function fmtLeft(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function startCountdown(ts){
  if(cdTimer){ clearInterval(cdTimer); cdTimer=null; }
  const end = ts + RESERVE_MS;
  const tick=()=>{
    const el=document.getElementById("cd");
    if(!el){ if(cdTimer){clearInterval(cdTimer);cdTimer=null;} return; }
    const left=end-Date.now();
    if(left<=0){ clearInterval(cdTimer); cdTimer=null; closeNum(); render(); return; }
    el.textContent=fmtLeft(left);
  };
  tick(); cdTimer=setInterval(tick,1000);
}
function pad(n){ return String(n).padStart(3,"0"); }
function money(v){ return "R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function render(){
  document.getElementById("title").textContent = TITLE;
  document.getElementById("cfgline").textContent = SUBTITLE+" · Cada número: "+money(PRICE);
  document.getElementById("s-total").textContent = TOTAL;
  const grid = document.getElementById("grid"); grid.innerHTML="";
  const q = document.getElementById("search").value.trim().toLowerCase();
  cart=cart.filter(x=>st(x)==="livre"); // sai do carrinho o que deixou de estar livre
  updateCartBar();
  let l=0,r=0,p=0;
  for(let n=1;n<=TOTAL;n++){
    const s=st(n); s==="livre"?l++:s==="reservado"?r++:p++;
    const rec=state[n]||{};
    let show=(filter==="todos"||filter===s);
    if(q){ show = show && (pad(n)+" "+(rec.nome||"")).toLowerCase().includes(q); }
    const el=document.createElement("div");
    el.className="num "+s+(cart.includes(n)?" incart":"")+(show?"":" hidden");
    el.innerHTML=pad(n)+((s!=="livre"&&rec.nome)?('<small>'+esc(rec.nome)+'</small>'):"");
    el.onclick=()=>openNum(n);
    grid.appendChild(el);
  }
  document.getElementById("s-livre").textContent=l;
  document.getElementById("s-reserv").textContent=r;
  document.getElementById("s-pago").textContent=p;
  document.getElementById("s-money").textContent=money(p*PRICE);

  // Barra de urgência: quanto já foi reservado/vendido (números indisponíveis)
  const taken = r + p;
  const pct   = TOTAL ? Math.round(taken / TOTAL * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent  = pct > 6 ? pct + "%" : "";
  const label = pct >= 80 ? "🔥 ÚLTIMOS! "+pct+"% já foram"
              : pct >= 40 ? "🔥 "+pct+"% já reservados — corra!"
              :             "🔥 "+pct+"% já reservados";
  document.getElementById("prog-label").textContent = label;
  document.getElementById("prog-rest").textContent  = l+" livre"+(l===1?"":"s");
  document.getElementById("progress").classList.toggle("hot", pct >= 70);

  // Arrecadação só aparece para o dono
  document.getElementById("arrecadado-bar").style.display = isAdmin ? "" : "none";
}

function openNum(n){
  current=n; const s=st(n); const rec=state[n]||{nome:"",tel:""};
  const sheet=document.getElementById("sheet");
  let h='<h2>Número '+pad(n)+'</h2><span class="badge '+s+'">'+lab(s)+'</span>';

  if(s==="pago"){
    h+='<div class="locknote">🔒 Vendido'+(isAdmin?(' para <b>'+esc(rec.nome||"—")+'</b>'+(rec.tel?(' · '+esc(rec.tel)):'')):'')+'. Número travado.</div>';
    h+='<div class="btns">';
    if(isAdmin) h+='<button class="btn btn-liberar" onclick="liberar()">Desbloquear e liberar</button>';
    h+='<button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
  }
  else if(s==="reservado"){
    if(isAdmin){
      if(isExpired(n)) h+='<div class="locknote">⚠️ Reserva expirada (já liberada para novos compradores). Confirme só se o pagamento chegou.</div>';
      h+='<label>Comprador</label><input id="in-nome" value="'+esc(rec.nome||"")+'">';
      h+='<label>WhatsApp</label><input id="in-tel" value="'+esc(rec.tel||"")+'">';
      h+='<div class="btns">';
      h+='<button class="btn btn-pago" onclick="mark(\'pago\')">✅ Confirmar Pix (pago)</button>';
      h+='<button class="btn btn-liberar" onclick="liberar()">Liberar número</button>';
      h+='<button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
    } else {
      h+='<div class="locknote">⏳ Reservado — pague antes que o tempo acabe: <b id="cd">--:--</b></div>';
      h+= BACKEND_URL ? '<div id="pixarea" style="text-align:center;padding:16px 0;color:#a89968">Gerando seu Pix… ⏳</div>' : pixBlock();
      h+='<div class="btns"><button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
    }
  }
  else { // livre (inclui reservas expiradas na visão do comprador)
    const b = getBuyer();
    const nome0 = b.nome || "";
    const tel0  = b.tel  || "";
    h+='<label>Seu nome</label><input id="in-nome" value="'+esc(nome0)+'" placeholder="Nome">';
    h+='<label>WhatsApp</label><input id="in-tel" value="'+esc(tel0)+'" placeholder="(00) 00000-0000">';
    if(b.nome && !isAdmin) h+='<div class="pixnote" style="background:#122015;border-color:#2f5c3a;color:#8ee6a5">✓ Dados salvos neste aparelho — é só reservar. <a href="#" onclick="clearBuyer();return false" style="color:#8ecae6">não sou eu</a></div>';
    if(BACKEND_URL) h+='<div class="pixnote">Ao reservar, você recebe um QR Code Pix de '+money(PRICE)+' — o pagamento é confirmado sozinho, na hora. ⚡</div>';
    else if(PIX_CHAVE) h+='<div class="pixnote">Após reservar, faça o Pix de '+money(PRICE)+' para a chave: <b>'+esc(PIX_CHAVE)+'</b> e avise o organizador.</div>';
    h+='<div class="btns">';
    // Com carrinho em uso, o botão principal leva ao Pix SOMADO — antes o
    // "Reservar este número" gerava um Pix de 1 número e parecia que o
    // carrinho "não somava" (armadilha que pegou compradores reais).
    if(!isAdmin && BACKEND_URL && cart.length){
      const tot = cart.includes(n) ? cart.length : cart.length+1;
      h+='<button class="btn btn-reservar" onclick="addToCartAndPay()">⚡ Pagar com o carrinho ('+tot+' número'+(tot>1?'s':'')+' — '+money(tot*PRICE)+')</button>';
      h+= cart.includes(n)
        ? '<button class="btn" style="background:#221c15;color:#e07070;border:1.5px solid #6e2a2a" onclick="delCart()">🛒 Tirar do carrinho</button>'
        : '<button class="btn" style="background:#221c15;color:#f0c75e;border:1.5px solid #9a7b1e" onclick="addCart()">🛒 Adicionar e escolher mais</button>';
    } else {
      h+='<button class="btn btn-reservar" onclick="mark(\'reservado\')">⏳ Reservar este número</button>';
      if(!isAdmin && BACKEND_URL){
        h+='<button class="btn" style="background:#221c15;color:#f0c75e;border:1.5px solid #9a7b1e" onclick="addCart()">🛒 Adicionar e escolher mais (1 Pix só)</button>';
      }
    }
    if(isAdmin) h+='<button class="btn btn-pago" onclick="mark(\'pago\')">✅ Marcar pago (dono)</button>';
    h+='<button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
  }
  sheet.innerHTML=h;
  document.getElementById("overlay").classList.add("open");
  if(s==="reservado" && !isAdmin && rec.ts) startCountdown(rec.ts); // conta o tempo restante
  if(s==="reservado" && !isAdmin && BACKEND_URL) loadPix(n);        // QR Code Pix automático
}
function lab(s){ return s==="pago"?"VENDIDO ✓":s==="reservado"?"RESERVADO":"LIVRE"; }

     'background:#221c15;border:2px solid #d4af37;color:#f5ecd2;border-radius:12px;letter-spacing:.5px">';
  h+='<button class="btn btn-pago" id="pix-copy" style="width:100%;margin-top:8px;font-size:16px" onclick="copyPix()">📋 Copiar chave Pix</button>';

// ── Carrinho: vários números num único Pix ──────────────────
const MAX_POR_PIX = 15;
function updateCartBar(){
  const bar=document.getElementById("cartbar");
  if(!cart.length){ bar.classList.add("hidden"); return; }
  bar.classList.remove("hidden");
  bar.innerHTML='<div class="ci">🛒 <b>'+cart.length+'</b> número'+(cart.length>1?"s":"")+': '+
    cart.slice().sort((a,b)=>a-b).map(pad).join(", ")+'<br>Total: <b>'+money(cart.length*PRICE)+'</b> num Pix só</div>'+
    '<button class="pagar" onclick="openCartCheckout()">⚡ PAGAR</button>'+
    '<button class="limpar" onclick="cart=[];render()" aria-label="limpar">✕</button>';
}
function addCart(){
  const nome=(document.getElementById("in-nome")||{}).value||"";
  const tel=(document.getElementById("in-tel")||{}).value||"";
  if(nome.trim()) saveBuyer(nome.trim(), tel.trim()); // aproveita o que já digitou
  if(cart.length>=MAX_POR_PIX){ aviso("Máximo de "+MAX_POR_PIX+" números por Pix."); return; }
  if(current!=null && !cart.includes(current)) cart.push(current);
  closeNum(); render();
}
function delCart(){ cart=cart.filter(x=>x!==current); closeNum(); render(); }
// Junta o número aberto ao carrinho (se ainda não estiver) e vai direto ao Pix somado
function addToCartAndPay(){
  const nome=(document.getElementById("in-nome")||{}).value||"";
  const tel=(document.getElementById("in-tel")||{}).value||"";
  if(nome.trim()) saveBuyer(nome.trim(), tel.trim());
  if(current!=null && !cart.includes(current)){
    if(cart.length>=MAX_POR_PIX){ aviso("Máximo de "+MAX_POR_PIX+" números por Pix."); return; }
    cart.push(current);
  }
  render(); openCartCheckout();
}
function openCartCheckout(){
  if(!cart.length) return;
  current=null;
  const b=getBuyer();
  const ns=cart.slice().sort((a,b)=>a-b);
  const sheet=document.getElementById("sheet");
  let h='<h2>Pagar '+ns.length+' número'+(ns.length>1?"s":"")+'</h2>'+
    '<span class="badge reservado">'+ns.map(pad).join(" · ")+'</span>'+
    '<div class="pixnote">Total: <b>'+money(ns.length*PRICE)+'</b> — um único Pix pra tudo. ⚡</div>'+
    '<label>Seu nome</label><input id="in-nome" value="'+esc(b.nome||"")+'" placeholder="Nome">'+
    '<label>WhatsApp</label><input id="in-tel" value="'+esc(b.tel||"")+'" placeholder="(00) 00000-0000">'+
    '<div class="btns"><button class="btn btn-pago" id="btn-cartpay" onclick="doCartPay()">⚡ Reservar e gerar o Pix único</button>'+
    '<button class="btn btn-fechar" onclick="closeNum()">Voltar</button></div>';
  sheet.innerHTML=h;
  document.getElementById("overlay").classList.add("open");
}
async function doCartPay(){
  if(!db){ aviso("Firebase não configurado."); return; }
  const nome=(document.getElementById("in-nome")||{}).value||"";
  const tel=(document.getElementById("in-tel")||{}).value||"";
  if(!nome.trim()){ aviso("Digite seu nome para continuar."); return; }
  const btn=document.getElementById("btn-cartpay");
  if(btn){ btn.disabled=true; btn.textContent="Reservando…"; }
  const ok=[], fail=[];
  for(const n of cart.slice()){
    await new Promise(resolve=>{
      db.ref("nums/"+n).transaction(cur=>{
        // só reserva se estiver livre (ou com reserva já expirada)
        if(cur && cur.status==="pago") return;
        if(cur && cur.status==="reservado" && cur.ts && (Date.now()-cur.ts <= RESERVE_MS)) return;
        return { status:"reservado", nome:nome.trim(), tel:tel.trim(), ts:Date.now() };
      },(err,committed)=>{ (committed && !err ? ok : fail).push(n); resolve(); });
    });
  }
  if(!ok.length){
    avisoTela("Poxa, esses números acabaram de ser levados por outra pessoa. Escolha outros.");
    cart=[]; render(); return;
  }
  saveBuyer(nome.trim(), tel.trim());
  notifyReserva(ok, nome.trim(), tel.trim());
  cart=[]; render();
  showCartPix(ok, fail);
}
function showCartPix(ns, fail){
  ns=ns.slice().sort((a,b)=>a-b);
  current=ns[0];
  const sheet=document.getElementById("sheet");
  let h='<h2>'+(ns.length>1? ns.length+' números reservados! ✅' : 'Número '+pad(ns[0])+' reservado! ✅')+'</h2>'+
    '<span class="badge reservado">'+ns.map(pad).join(" · ")+'</span>';
  if(fail && fail.length) h+='<div class="locknote">⚠️ Ficaram de fora (outra pessoa levou antes): <b>'+fail.map(pad).join(", ")+'</b></div>';
  h+='<div class="locknote">⏳ Você tem <b id="cd">'+fmtLeft(RESERVE_MS)+'</b> para pagar'+(ns.length>1?' os '+ns.length+' números num único Pix':'')+', senão volta(m) a ficar livre(s).</div>';
  h+= BACKEND_URL ? '<div id="pixarea" style="text-align:center;padding:16px 0;color:#a89968">Gerando seu Pix… ⏳</div>' : pixBlock();
  h+='<div class="btns"><button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
  sheet.innerHTML=h;
  document.getElementById("overlay").classList.add("open");
  startCountdown(Date.now());
  if(BACKEND_URL) loadPix(ns);
}

// ── Fase 2: Pix automático via Mercado Pago ─────────────────
let payingFor=null, colaCode="";
async function loadPix(ns){
  ns=[].concat(ns); payingFor=ns;
  const area=()=>document.getElementById("pixarea");
  try{
    const b=getBuyer(); const rec=state[ns[0]]||{};
    const r=await fetch(BACKEND_URL+"/api/create-payment",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({numeros:ns, nome:rec.nome||b.nome||"", tel:rec.tel||b.tel||""})
    });
    const d=await r.json().catch(()=>({}));
    if(!r.ok || !d.copia_cola) throw new Error(d.error||"falha ao gerar Pix");
    if(current===null || !ns.includes(current) || !area()) return; // usuário fechou a tela enquanto gerava
    colaCode=d.copia_cola;
    const plural = ns.length>1;
    let h='<div class="locknote" style="background:#122015;border-color:#2f5c3a;color:#8ee6a5;font-size:14px;text-align:left">'+
          'Pague <b>'+money(d.valor||PRICE*ns.length)+'</b>'+(plural?' (os '+ns.length+' números num Pix só)':'')+
          ' pelo QR Code ou código abaixo. <b>A confirmação é automática</b> — assim que o Pix cair, '+
          (plural?'seus números travam':'o número trava')+' no seu nome. 🎉</div>';
    if(d.qr_base64) h+='<img src="data:image/png;base64,'+d.qr_base64+'" alt="QR Code Pix" '+
       'style="width:210px;max-width:80%;margin:12px auto;display:block;background:#fff;padding:10px;border-radius:12px">';
    h+='<label style="text-align:left">Pix copia e cola — toque para copiar</label>';
    h+='<input id="cola-key" readonly value="'+esc(colaCode)+'" onclick="copyCola()" '+
       'style="width:100%;font-family:monospace;font-size:12px;text-align:center;padding:12px 10px;'+
       'background:#221c15;border:2px solid #d4af37;color:#f5ecd2;border-radius:12px">';
    h+='<button class="btn btn-pago" id="cola-copy" style="width:100%;margin-top:8px;font-size:16px" onclick="copyCola()">📋 Copiar código Pix</button>';
    area().innerHTML=h;
  }catch(e){
    if(current===null || !ns.includes(current) || !area()) return;
    // plano B: chave Pix manual de sempre
    area().style.textAlign="left";
    area().innerHTML='<div class="locknote">⚠️ '+esc(e.message||"Não consegui gerar o QR Code agora.")+'</div>'+pixBlock(PRICE*ns.length);
  }
}
function copyCola(){
  const inp=document.getElementById("cola-key");
  const btn=document.getElementById("cola-copy");
  const done=()=>{ if(btn){ btn.textContent="Copiado ✓"; setTimeout(()=>{ if(btn) btn.textContent="📋 Copiar código Pix"; },2000); } };
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(colaCode).then(done, ()=>{ inp.select(); document.execCommand("copy"); done(); });
    } else { inp.select(); document.execCommand("copy"); done(); }
  }catch(e){ if(inp) inp.select(); }
}
// Tela de sucesso quando o webhook confirma o pagamento (via Realtime Database)
function showPaidOk(n){
  const ns=[].concat(n).slice().sort((a,b)=>a-b);
  payingFor=null;
  if(cdTimer){ clearInterval(cdTimer); cdTimer=null; }
  const rec=state[ns[0]]||{};
  const plural=ns.length>1;

  sheet.innerHTML='<h2>Pagamento confirmado! 🎉</h2><span class="badge pago">VENDIDO ✓</span>'+
    '<div class="locknote" style="background:#122015;border-color:#2f5c3a;color:#8ee6a5;font-size:15px">'+
    (plural?'Os números <b>'+ns.map(pad).join(", ")+'</b> agora são seus':'O número <b>'+pad(ns[0])+'</b> agora é seu')+
    (rec.nome?(', <b>'+esc(rec.nome)+'</b>'):'')+'! Boa sorte no sorteio. 🍀</div>'+
    '<div class="btns"><button class="btn btn-pago" onclick="closeNum()">Quero mais número 😄</button></div>';

function copyPix(){
  const inp=document.getElementById("pix-key");
  const btn=document.getElementById("pix-copy");
  const done=()=>{ if(btn){ btn.textContent="Copiado ✓"; setTimeout(()=>{ if(btn) btn.textContent="📋 Copiar chave Pix"; },2000); } };
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(PIX_CHAVE).then(done, ()=>{ inp.select(); document.execCommand("copy"); done(); });
    } else { inp.select(); document.execCommand("copy"); done(); }
  }catch(e){ if(inp) inp.select(); }
}

// Avisos dentro da tela: alert() é bloqueado no navegador embutido do
// WhatsApp/Instagram (mesmo motivo do PIN não usar prompt()) — o comprador
// clicava e "nada acontecia". Nunca usar alert() na jornada do comprador.
function aviso(msg){
  const sheet=document.getElementById("sheet");
  if(!sheet || !document.getElementById("overlay").classList.contains("open")) return;
  let n=document.getElementById("aviso-in");
  if(!n){
    n=document.createElement("div");
    n.id="aviso-in"; n.className="locknote";
    n.style.borderColor="#8a3333"; n.style.color="#ffb3b3";
    sheet.prepend(n);
  }
  n.textContent="⚠️ "+msg;
  n.scrollIntoView({block:"nearest"});
}
function avisoTela(msg){
  const sheet=document.getElementById("sheet");
  sheet.innerHTML='<h2>Ops! 😕</h2><div class="locknote">'+esc(msg)+'</div>'+
    '<div class="btns"><button class="btn btn-fechar" onclick="closeNum()">Fechar</button></div>';
  document.getElementById("overlay").classList.add("open");
}

function mark(status){
  if(!db){ aviso("Firebase não configurado."); return; }
  if(status==="pago" && !isAdmin){ aviso("Só o dono confirma pagamento."); return; }
  const nome=(document.getElementById("in-nome")||{}).value||"";
  const tel=(document.getElementById("in-tel")||{}).value||"";
  if(!nome.trim()){ aviso("Digite seu nome para continuar."); return; }
  // trava anti-duplicidade: não deixa reservar/pagar por cima de um já pago
  // (garantida também no servidor pelas regras do Realtime Database)
  const ref=db.ref("nums/"+current);
  ref.transaction(cur=>{
    if(cur && cur.status==="pago" && !isAdmin) return; // aborta
    return { status, nome:nome.trim(), tel:tel.trim(), ts:Date.now() };
  }, (err,committed)=>{
    if(!committed && !err){ avisoTela("Esse número já foi vendido. Escolha outro."); }
    else if(err){ avisoTela("Não foi possível salvar agora. Tente de novo em instantes."); }
    else if(status==="reservado" && !isAdmin){
      saveBuyer(nome.trim(), tel.trim());       // lembra pro próximo número
      notifyReserva(current, nome.trim(), tel.trim()); // avisa o dono no Telegram
      showPixConfirm(current);                  // mostra a chave Pix pra copiar
    }
    else closeNum();
  });
}
// Avisa o organizador no Telegram a cada reserva (best-effort, nunca trava a reserva)
function notifyReserva(n, nome, tel){
  if(!BACKEND_URL) return;
  try{
    fetch(BACKEND_URL+"/api/avisar",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ numeros:[].concat(n), nome:nome||"", tel:tel||"" })
    }).catch(()=>{});
  }catch(e){}
}
function liberar(){
  if(!isAdmin){ return; }
  if(!confirm("Liberar o número "+pad(current)+"?")) return;
  db.ref("nums/"+current).remove(); closeNum();
}
function closeNum(){ document.getElementById("overlay").classList.remove("open"); current=null; if(cdTimer){ clearInterval(cdTimer); cdTimer=null; } }

document.getElementById("btn-admin").onclick=async function(){
  if(isAdmin){ await auth.signOut(); return; }
  openLogin();
};

// Caixa de PIN dentro da página (funciona no navegador do WhatsApp, onde prompt() é bloqueado)
function openLogin(){
  current=null;
  const sheet=document.getElementById("sheet");
  sheet.innerHTML =
    '<h2>Modo dono</h2><span class="badge livre">ACESSO RESTRITO</span>'+
    '<label>PIN do dono</label>'+
    '<input id="in-pin" type="password" inputmode="numeric" autocomplete="off" placeholder="Digite seu PIN">'+
    '<div id="pin-erro" class="locknote" style="display:none">PIN incorreto. Tente novamente.</div>'+
    '<div class="btns">'+
    '<button class="btn btn-pago" id="btn-entrar">🔓 Entrar</button>'+
    '<button class="btn btn-fechar" onclick="closeNum()">Cancelar</button></div>';
  document.getElementById("overlay").classList.add("open");
  const inp=document.getElementById("in-pin");
  const go=async()=>{
    const p=(inp.value||"").trim();
    if(!p) return;
    document.getElementById("pin-erro").style.display="none";
    const btn=document.getElementById("btn-entrar");
    btn.textContent="Entrando…"; btn.disabled=true;
    try{
      await auth.signInWithEmailAndPassword(ADMIN_EMAIL, p);
      closeNum(); // sucesso — onAuthStateChanged ativa o modo dono
    }catch(e){
      document.getElementById("pin-erro").style.display="block";
      btn.textContent="🔓 Entrar"; btn.disabled=false;
    }
  };
  document.getElementById("btn-entrar").onclick=go;
  inp.onkeydown=e=>{ if(e.key==="Enter") go(); };
  setTimeout(()=>inp.focus(),100);
}
document.getElementById("search").oninput=render;
document.querySelectorAll(".filter").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".filter").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); filter=b.dataset.f; render();
});
document.getElementById("overlay").onclick=e=>{ if(e.target.id==="overlay") closeNum(); };
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

boot();
</script>
